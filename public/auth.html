<!DOCTYPE html>
<html class="dark scroll-smooth" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sign in or create your Prediction Club account. Start playing and winning today.">
  <title>Prediction Club | Authentication</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#00e476",
            "secondary": "#d0bcff",
            "surface": "#131316",
            "surface-variant": "#353438",
            "surface-container-lowest": "#0e0e11",
            "surface-container-low": "#1b1b1e",
            "surface-container": "#1f1f22",
            "surface-container-high": "#2a2a2d",
            "surface-container-highest": "#353438",
            "on-surface": "#e4e1e6",
            "on-primary": "#003919",
            "error": "#ffb4ab"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          "animation": {
            "float-slow": "float 8s ease-in-out infinite",
            "float-fast": "float 5s ease-in-out infinite reverse",
          },
          "keyframes": {
            float: {
              '0%, 100%': { transform: 'translateY(0) scale(1)' },
              '50%': { transform: 'translateY(-20px) scale(1.05)' },
            }
          }
        },
      },
    }
  </script>

  <style>
    body {
      background-color: #131316;
      color: #e4e1e6;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .kinetic-gradient {
      background: linear-gradient(135deg, #00e476 0%, #006a33 100%);
    }

    .glow-border {
      border: 1px solid rgba(228, 225, 230, 0.1);
    }

    .form-panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .form-panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="bg-surface-container-lowest min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <div
    class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-primary/10 rounded-full blur-[100px] animate-float-slow pointer-events-none">
  </div>
  <div
    class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-secondary/10 rounded-full blur-[120px] animate-float-fast pointer-events-none">
  </div>

  <a href="/"
    class="absolute top-6 left-6 flex items-center gap-2 text-zinc-500 hover:text-white transition-colors font-bold text-sm z-20"
    id="backLink">
    <span class="material-symbols-outlined text-lg">arrow_back</span> Back to Home
  </a>

  <main
    class="w-full max-w-md bg-surface-container-high/90 backdrop-blur-2xl rounded-3xl shadow-2xl glow-border p-6 md:p-8 relative z-10"
    id="authCard">

    <div class="text-center mb-8">
      <div
        class="w-12 h-12 kinetic-gradient rounded-full flex items-center justify-center mx-auto mb-3 shadow-[0_0_20px_rgba(0,228,118,0.3)]">
        <span class="material-symbols-outlined text-on-primary font-bold text-2xl">bolt</span>
      </div>
      <h1 class="italic font-black text-2xl text-primary leading-none tracking-tighter">PREDICTION<span
          class="text-white">CLUB</span></h1>
      <p class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-bold mt-1">Premium Gaming Platform</p>
    </div>

    <div class="flex gap-2 mb-8 bg-surface-container-lowest p-1 rounded-xl" id="authTabs">
      <button
        class="flex-1 py-2 text-sm font-black uppercase tracking-widest rounded-lg bg-surface-container-high text-primary shadow transition-all"
        data-tab="signin" id="tabSignIn">SIGN IN</button>
      <button
        class="flex-1 py-2 text-sm font-bold uppercase tracking-widest rounded-lg text-zinc-500 hover:text-white transition-all"
        data-tab="signup" id="tabSignUp">SIGN UP</button>
    </div>

    <div class="form-panel active" id="signInPanel">
      <div class="mb-6 text-center">
        <h2 class="text-2xl font-black italic tracking-tighter">WELCOME BACK</h2>
        <p class="text-xs text-zinc-400">Sign in to continue playing and winning.</p>
      </div>

      <form id="signInForm" class="flex flex-col gap-4">
        <div>
          <label for="si_email" class="text-[10px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Email
            or Phone</label>
          <input type="text" id="si_email"
            class="w-full bg-surface-container-lowest border border-white/5 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-sm"
            placeholder="name@example.com" required>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label for="si_password"
              class="text-[10px] uppercase tracking-widest text-zinc-400 font-bold block">Password</label>
            <a href="#" class="text-[10px] font-bold text-primary hover:underline" id="forgotPasswordLink">Forgot?</a>
          </div>
          <div class="relative">
            <input type="password" id="si_password"
              class="w-full bg-surface-container-lowest border border-white/5 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-sm"
              placeholder="Enter your password" required>
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white"
              id="siEyeToggle">
              <span class="material-symbols-outlined text-lg">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex items-center gap-2 mt-1 mb-2">
          <input type="checkbox" id="si_remember"
            class="rounded bg-surface-container-lowest border-white/10 text-primary focus:ring-primary focus:ring-offset-surface">
          <label for="si_remember" class="text-xs text-zinc-400 font-medium">Remember me</label>
        </div>

        <button type="submit" id="signInSubmit"
          class="w-full kinetic-gradient text-on-primary font-black py-4 rounded-xl tracking-widest shadow-[0_0_20px_rgba(0,228,118,0.2)] hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
          ACCESS ACCOUNT <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
      </form>

      <div class="my-6 flex items-center gap-3">
        <hr class="flex-1 border-white/5"><span
          class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">OR</span>
        <hr class="flex-1 border-white/5">
      </div>

      <button type="button" id="googleBtn"
        class="w-full bg-white text-black font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 hover:bg-zinc-200 transition-colors text-sm">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5"> Continue with
        Google
      </button>

      <p class="text-center text-xs text-zinc-500 mt-6 font-medium">
        Don't have an account? <button type="button" class="text-primary font-bold hover:underline"
          id="switchToSignUp">Create one</button>
      </p>
    </div>

    <div class="form-panel" id="signUpPanel">
      <div class="mb-6 text-center">
        <h2 class="text-2xl font-black italic tracking-tighter">CREATE ACCOUNT</h2>
        <p class="text-xs text-zinc-400">Join 12,000+ players winning every day.</p>
      </div>

      <form id="signUpForm" class="flex flex-col gap-4">
        <div>
          <label for="su_name" class="text-[10px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Full
            Name</label>
          <input type="text" id="su_name"
            class="w-full bg-surface-container-lowest border border-white/5 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-sm"
            placeholder="Enter your full name" required>
        </div>

        <div>
          <label for="su_email" class="text-[10px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Email
            Address</label>
          <input type="email" id="su_email"
            class="w-full bg-surface-container-lowest border border-white/5 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-sm"
            placeholder="name@example.com" required>
        </div>

        <div>
          <label for="su_phone" class="text-[10px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Phone
            Number</label>
          <input type="tel" id="su_phone"
            class="w-full bg-surface-container-lowest border border-white/5 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-sm"
            placeholder="+91 9876543210" required>
        </div>

        <div>
          <label for="su_password"
            class="text-[10px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Password</label>
          <div class="relative">
            <input type="password" id="su_password"
              class="w-full bg-surface-container-lowest border border-white/5 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-sm"
              placeholder="Min 8 characters" minlength="8" required>
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white"
              id="suEyeToggle">
              <span class="material-symbols-outlined text-lg">visibility</span>
            </button>
          </div>
          <div class="w-full h-1 bg-surface-container-lowest mt-2 rounded-full overflow-hidden flex"
            id="passwordStrength">
            <div class="h-full bg-zinc-600 w-0 transition-all duration-300" id="strengthFill"></div>
          </div>
          <span class="text-[10px] text-zinc-500 block mt-1" id="strengthLabel"></span>
        </div>

        <div class="flex items-start gap-2 mt-1 mb-2">
          <input type="checkbox" id="su_terms"
            class="mt-0.5 rounded bg-surface-container-lowest border-white/10 text-primary focus:ring-primary focus:ring-offset-surface"
            required>
          <label for="su_terms" class="text-[10px] text-zinc-400 font-medium">I agree to the <a href="#"
              class="text-white underline">Terms</a> & <a href="#" class="text-white underline">Privacy
              Policy</a>.</label>
        </div>

        <button type="submit" id="signUpSubmit"
          class="w-full kinetic-gradient text-on-primary font-black py-4 rounded-xl tracking-widest shadow-[0_0_20px_rgba(0,228,118,0.2)] hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
          CREATE ACCOUNT <span class="material-symbols-outlined text-sm">bolt</span>
        </button>
      </form>

      <p class="text-center text-xs text-zinc-500 mt-6 font-medium">
        Already have an account? <button type="button" class="text-primary font-bold hover:underline"
          id="switchToSignIn">Sign In</button>
      </p>
    </div>

    </div>

  </main>

  <div class="absolute bottom-4 text-center w-full z-10">
    <span class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">&copy; 2026 Prediction Club. Play
      responsibly.</span>
  </div>

  <script>
    const tabSignIn = document.getElementById('tabSignIn');
    const tabSignUp = document.getElementById('tabSignUp');
    const signInPanel = document.getElementById('signInPanel');
    const signUpPanel = document.getElementById('signUpPanel');

    const switchToSignInBtn = document.getElementById('switchToSignIn');
    const switchToSignUpBtn = document.getElementById('switchToSignUp');

    const styleActive = ['bg-surface-container-high', 'text-primary', 'shadow'];
    const styleInactive = ['text-zinc-500', 'hover:text-white', 'bg-transparent', 'shadow-none'];

    function showSignIn() {
      signInPanel.classList.add('active');
      signUpPanel.classList.remove('active');

      tabSignIn.classList.add(...styleActive);
      tabSignIn.classList.remove(...styleInactive);

      tabSignUp.classList.remove(...styleActive);
      tabSignUp.classList.add(...styleInactive);
    }

    function showSignUp() {
      signUpPanel.classList.add('active');
      signInPanel.classList.remove('active');

      tabSignUp.classList.add(...styleActive);
      tabSignUp.classList.remove(...styleInactive);

      tabSignIn.classList.remove(...styleActive);
      tabSignIn.classList.add(...styleInactive);
    }

    tabSignIn.addEventListener('click', showSignIn);
    switchToSignInBtn.addEventListener('click', showSignIn);

    tabSignUp.addEventListener('click', showSignUp);
    switchToSignUpBtn.addEventListener('click', showSignUp);

    // Simple eye toggle logic fallback
    document.getElementById('siEyeToggle').addEventListener('click', function () {
      const input = document.getElementById('si_password');
      const icon = this.querySelector('span');
      if (input.type === 'password') { input.type = 'text'; icon.innerText = 'visibility_off'; }
      else { input.type = 'password'; icon.innerText = 'visibility'; }
    });

    document.getElementById('suEyeToggle').addEventListener('click', function () {
      const input = document.getElementById('su_password');
      const icon = this.querySelector('span');
      if (input.type === 'password') { input.type = 'text'; icon.innerText = 'visibility_off'; }
      else { input.type = 'password'; icon.innerText = 'visibility'; }
    });
  </script>

  <script src="/js/auth.js"></script>
</body>

</html>
